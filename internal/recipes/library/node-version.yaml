id: node-version-mismatch
probe: node-version

# Fixes are evaluated top-to-bottom. The first non-fallback Fix whose
# `when:` clause matches the user's system wins; if none match, the
# first fallback Fix that matches wins. Brew is the fallback because it
# touches global state (class: shared), while mise/fnm/nvm/asdf install
# Node into a tool-local directory (class: safe).

fixes:
  - id: mise-install-node
    class: safe
    when: { has_tool: mise }
    label: "Install Node {{.Required}} via mise"
    command: "mise install node@{{.Required}} && mise use node@{{.Required}}"
    test:
      image: envdoctor/test-linux-mise:latest
      params: { Required: "20.10.0" }
      before:
        check: "node --version 2>/dev/null | grep -qv '^v20.10.0' || true"
      after:
        check: "node --version | grep -q '^v20.10.0'"
        idempotent: true

  - id: fnm-install-node
    class: safe
    when: { has_tool: fnm }
    label: "Install Node {{.Required}} via fnm"
    # eval $(fnm env --shell bash) populates FNM_MULTISHELL_PATH so
    # `fnm use` can swap the active version. --shell bash is required
    # when fnm can't infer the parent shell (e.g. `bash -c`, CI runners,
    # process-detached invocations). Bash-style `export` lines also
    # evaluate correctly in zsh, so this form is safe for both.
    command: 'eval "$(fnm env --shell bash)" && fnm install {{.Required}} && fnm use {{.Required}}'
    test:
      image: envdoctor/test-linux-fnm:latest
      params: { Required: "20.10.0" }
      before:
        check: "node --version 2>/dev/null | grep -qv '^v20.10.0' || true"
      after:
        check: "node --version | grep -q '^v20.10.0'"
        idempotent: true

  - id: nvm-install-node
    class: safe
    when: { has_tool: nvm }
    label: "Install Node {{.Required}} via nvm"
    # nvm is a shell function in most installations rather than an
    # executable on PATH, so has_tool: nvm will usually be false. This
    # Fix is kept for the (rare) cases where nvm is installed as a
    # binary, and documents the intended invocation otherwise.
    command: "nvm install {{.Required}} && nvm use {{.Required}}"
    test:
      image: envdoctor/test-linux-nvm:latest
      params: { Required: "20.10.0" }
      before:
        check: "node --version 2>/dev/null | grep -qv '^v20.10.0' || true"
      after:
        check: "node --version | grep -q '^v20.10.0'"
        idempotent: true

  - id: asdf-install-node
    class: safe
    when: { has_tool: asdf }
    label: "Install Node {{.Required}} via asdf"
    # `asdf plugin add nodejs` is idempotent in spirit (errors when the
    # plugin already exists); `|| true` neutralizes that under `set -e`.
    command: 'asdf plugin add nodejs >/dev/null 2>&1 || true; asdf install nodejs {{.Required}} && asdf local nodejs {{.Required}}'
    test:
      image: envdoctor/test-linux-asdf:latest
      params: { Required: "20.10.0" }
      before:
        check: "node --version 2>/dev/null | grep -qv '^v20.10.0' || true"
      after:
        check: "node --version | grep -q '^v20.10.0'"
        idempotent: true

  - id: brew-install-node
    class: shared
    when: { has_tool: brew }
    label: "Install node@{{.MajorVersion}} via Homebrew"
    command: "brew install node@{{.MajorVersion}}"
    fallback: true
    test:
      image: envdoctor/test-darwin-brew:latest
      params: { MajorVersion: "20" }
      before:
        check: "! brew list node@20 >/dev/null 2>&1"
      after:
        check: "brew list node@20 >/dev/null 2>&1"
        idempotent: true
