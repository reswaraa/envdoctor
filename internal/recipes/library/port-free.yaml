id: port-collision
probe: port-free

# Two fixes. The primary is destructive (kills the process holding the
# port via lsof) and requires explicit consent under --fix even with
# --yes. The fallback is informational, listing brew-managed services
# so the user can decide whether to stop one rather than kill blindly.

fixes:
  - id: kill-port-holder
    class: destructive
    label: "Kill process holding port {{.Port}}"
    command: "kill $(lsof -ti :{{.Port}})"
    test:
      image: envdoctor/test-linux-fresh:latest
      params: { Port: "5432" }
      setup: |
        # Stage a process holding port 5432 so the Fix has something to kill.
        # nc -l keeps the socket bound until killed; the & detaches it.
        ( nc -l -p 5432 </dev/null >/dev/null 2>&1 & )
        sleep 0.2
      before:
        check: "lsof -ti :5432 >/dev/null"
      after:
        check: "! lsof -ti :5432 >/dev/null"
        idempotent: false

  - id: brew-services-list
    class: shared
    when: { has_tool: brew }
    label: "List Homebrew services that may be holding port {{.Port}}"
    command: "brew services list"
    fallback: true
    test:
      image: envdoctor/test-darwin-brew:latest
      params: { Port: "5432" }
      before:
        check: "command -v brew"
      after:
        check: "brew services list >/dev/null"
        idempotent: true
