services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app

  cache:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    image: alpine:3.20
    command: redis-cli -h cache monitor
    environment:
      WORKER_TOKEN: ${WORKER_TOKEN}
    depends_on:
      - cache
